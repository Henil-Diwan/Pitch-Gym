<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vapi_shark</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
             :root {
        --bg-deep: #030303;
        --bg-card: #09090b;
        --accent-indigo: #6366f1;
        --accent-cyan: #22d3ee;
        --text-primary: #fafafa;
        --text-secondary: #71717a;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        overflow-x: hidden;
      }

      .mono {
        font-family: 'JetBrains Mono', monospace;
      }

      .mesh-gradient {
        background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0, transparent 40%),
                    radial-gradient(at 100% 0%, rgba(34, 211, 238, 0.12) 0, transparent 40%),
                    radial-gradient(at 50% 50%, rgba(99, 102, 241, 0.05) 0, transparent 50%);
      }

      .glass-morphism {
        background: rgba(12, 12, 14, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .text-gradient {
        background: linear-gradient(135deg, #fff 30%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .btn-primary {
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        box-shadow: 0 4px 20px -5px rgba(99, 102, 241, 0.4);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .btn-primary:hover {
        box-shadow: 0 8px 30px -5px rgba(99, 102, 241, 0.6);
        transform: translateY(-2px);
      }

      .card-glow {
        position: relative;
      }
      .card-glow::after {
        content: "";
        position: absolute;
        inset: -1px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), transparent, rgba(34, 211, 238, 0.2));
        border-radius: inherit;
        z-index: -1;
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      .card-glow:hover::after {
        opacity: 1;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #030303;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 10px;
      }
      
      @keyframes slow-pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.05); }
      }
      .bg-pulse {
        animation: slow-pulse 8s ease-in-out infinite;
      }
      html,
body {
  background-color: #030303;
}
body {
  transition: background-color 0.2s ease;
}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
